name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p dist/cf7-r2-storage
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            . dist/cf7-r2-storage/
          cd dist
          zip -r cf7-r2-storage.zip cf7-r2-storage/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CF7 R2 Storage ${{ github.ref_name }}"
          files: dist/cf7-r2-storage.zip
          generate_release_notes: true
